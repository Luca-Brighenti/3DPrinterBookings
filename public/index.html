<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECH PrintLab — 3D Print Submission</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --surface: #111114;
    --surface-raised: #18181b;
    --surface-overlay: #1f1f23;
    --surface-bright: #27272a;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.1);
    --accent: #f97316;
    --accent-bright: #fb923c;
    --accent-dim: rgba(249,115,22,0.15);
    --accent-subtle: rgba(249,115,22,0.08);
    --emerald: #10b981;
    --emerald-dim: rgba(16,185,129,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --rose: #f43f5e;
    --rose-dim: rgba(244,63,94,0.12);
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.12);
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;
    --text-muted: #52525b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; -webkit-font-smoothing:antialiased; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 80% 50% at 10% 0%, rgba(249,115,22,0.06) 0%, transparent 50%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(56,189,248,0.03) 0%, transparent 50%); pointer-events:none; z-index:0; }
  ::selection { background:rgba(249,115,22,0.3); color:#fff; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--surface-bright); border-radius:3px; }

  header { background:rgba(9,9,11,0.8); backdrop-filter:blur(20px) saturate(1.2); -webkit-backdrop-filter:blur(20px) saturate(1.2); border-bottom:1px solid var(--border); padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:32px; height:32px; }
  .logo-icon svg { width:100%; height:100%; filter:drop-shadow(0 0 8px rgba(249,115,22,0.4)); }
  .logo-text { font-weight:800; font-size:1.05rem; letter-spacing:-0.02em; }
  .logo-text span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:1rem; }
  .status-pill { font-family:var(--mono); font-size:0.65rem; font-weight:500; padding:4px 10px; border-radius:99px; background:var(--emerald-dim); color:var(--emerald); letter-spacing:0.05em; display:flex; align-items:center; gap:5px; }
  .status-pill::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--emerald); animation:pulse 2s ease-in-out infinite; }
  .clock { font-family:var(--mono); font-size:0.75rem; color:var(--text-tertiary); letter-spacing:0.05em; font-weight:500; }

  .container { max-width:900px; margin:0 auto; padding:2rem 1.5rem; position:relative; z-index:1; }

  /* ── Submit Form ── */
  .submit-section { margin-bottom:2.5rem; animation:fadeIn 0.4s ease; }
  .section-label { font-family:var(--mono); font-size:0.62rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.35rem; }
  .section-title { font-size:1.25rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:1.25rem; }

  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; }
  .form-group { margin-bottom:0.85rem; }
  .form-label { font-family:var(--mono); font-size:0.62rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:0.35rem; display:block; }
  .form-input, .form-select, .form-textarea { width:100%; background:var(--surface-raised); border:1px solid var(--border); border-radius:var(--radius-xs); color:var(--text); font-family:var(--sans); font-size:0.85rem; font-weight:500; padding:0.6rem 0.75rem; outline:none; transition:all 0.15s ease; -webkit-appearance:none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-subtle), 0 0 0 1px var(--accent); background:var(--surface-overlay); }
  .form-input::placeholder, .form-textarea::placeholder { color:var(--text-muted); }
  .form-select option { background:var(--surface-raised); }
  .form-textarea { resize:vertical; min-height:56px; font-size:0.82rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; }

  .file-upload { position:relative; }
  .file-upload input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .file-upload-label { display:flex; align-items:center; gap:0.65rem; background:var(--surface-raised); border:1px dashed var(--border-hover); border-radius:var(--radius-sm); padding:0.85rem 1rem; color:var(--text-muted); font-size:0.78rem; font-weight:500; transition:all 0.15s ease; }
  .file-upload-label:hover { border-color:var(--accent-dim); color:var(--text-secondary); background:var(--surface-overlay); }
  .file-upload-label.has-file { border-color:var(--emerald); border-style:solid; color:var(--emerald); background:var(--emerald-dim); }
  .file-hint { font-family:var(--mono); font-size:0.58rem; font-weight:500; color:var(--text-muted); margin-top:0.35rem; }

  .duration-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.35rem; }
  .duration-btn { background:var(--surface-raised); border:1px solid var(--border); border-radius:var(--radius-xs); color:var(--text-muted); font-family:var(--mono); font-size:0.68rem; font-weight:600; padding:0.5rem; cursor:pointer; text-align:center; transition:all 0.15s ease; }
  .duration-btn:hover { border-color:var(--border-hover); color:var(--text-secondary); }
  .duration-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent-bright); }

  /* ── Checklist ── */
  .checklist { background:var(--surface-raised); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.85rem 1rem; margin-bottom:0.85rem; display:flex; flex-direction:column; gap:0.55rem; }
  .checklist-title { font-family:var(--mono); font-size:0.62rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:0.15rem; }
  .check-item { display:flex; align-items:flex-start; gap:0.55rem; cursor:pointer; }
  .check-item input[type="checkbox"] { appearance:none; -webkit-appearance:none; width:16px; height:16px; min-width:16px; border:1px solid var(--border-hover); border-radius:4px; background:var(--surface); cursor:pointer; position:relative; margin-top:1px; transition:all 0.15s ease; }
  .check-item input[type="checkbox"]:checked { background:var(--accent); border-color:var(--accent); }
  .check-item input[type="checkbox"]:checked::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.6rem; font-weight:700; }
  .check-item input[type="checkbox"]:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .check-item label { font-size:0.75rem; font-weight:500; color:var(--text-secondary); cursor:pointer; line-height:1.35; }
  .checklist.has-error { border-color:var(--rose); }

  .submit-btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-xs); font-family:var(--sans); font-size:0.82rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; padding:0.85rem; cursor:pointer; transition:all 0.2s ease; margin-top:0.25rem; }
  .submit-btn:hover:not(:disabled) { background:var(--accent-bright); box-shadow:0 4px 16px rgba(249,115,22,0.35); transform:translateY(-1px); }
  .submit-btn:disabled { opacity:0.3; cursor:not-allowed; }

  /* ── Active Jobs ── */
  .jobs-section { margin-bottom:2.5rem; }
  .jobs-grid { display:flex; flex-direction:column; gap:0.4rem; }
  .job-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.7rem 0.85rem; display:flex; align-items:center; gap:0.75rem; animation:fadeIn 0.3s ease backwards; transition:background 0.12s; }
  .job-row:hover { background:var(--surface-raised); }
  .job-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .job-status-dot.queued { background:var(--accent); box-shadow:0 0 6px rgba(249,115,22,0.5); }
  .job-status-dot.printing { background:var(--amber); box-shadow:0 0 6px rgba(245,158,11,0.5); animation:pulse 1.5s ease-in-out infinite; }
  .job-printer-label { font-family:var(--mono); font-size:0.68rem; font-weight:600; color:var(--accent); min-width:90px; }
  .job-details { flex:1; min-width:0; }
  .job-team-line { font-size:0.78rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-meta-line { font-family:var(--mono); font-size:0.58rem; font-weight:500; color:var(--text-muted); margin-top:1px; }
  .job-status-badge { font-family:var(--mono); font-size:0.55rem; font-weight:600; padding:3px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:0.06em; flex-shrink:0; }
  .badge-queued { background:var(--accent-dim); color:var(--accent-bright); }
  .badge-printing { background:var(--amber-dim); color:var(--amber); }

  /* ── Rejection Board ── */
  .rejected-section { margin-bottom:2rem; }
  .rejected-list { display:flex; flex-direction:column; gap:0.35rem; }
  .rejected-row { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--rose); border-radius:var(--radius-sm); padding:0.6rem 0.75rem 0.6rem 1rem; display:flex; align-items:center; gap:0.75rem; }
  .rejected-team { font-size:0.78rem; font-weight:600; min-width:100px; }
  .rejected-file { font-family:var(--mono); font-size:0.65rem; font-weight:500; color:var(--text-tertiary); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rejected-reason { font-family:var(--mono); font-size:0.62rem; font-weight:500; color:var(--rose); max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rejected-date { font-family:var(--mono); font-size:0.58rem; font-weight:500; color:var(--text-muted); flex-shrink:0; }

  .empty-msg { text-align:center; padding:1.75rem; color:var(--text-muted); font-size:0.78rem; font-family:var(--mono); font-weight:500; }

  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(12px); background:rgba(16,185,129,0.12); backdrop-filter:blur(16px); border:1px solid rgba(16,185,129,0.2); color:var(--emerald); font-family:var(--mono); font-size:0.75rem; font-weight:600; padding:0.7rem 1.25rem; border-radius:var(--radius-sm); opacity:0; transition:all 0.3s cubic-bezier(.4,0,.2,1); pointer-events:none; z-index:9000; white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error { background:rgba(244,63,94,0.12); border-color:rgba(244,63,94,0.2); color:var(--rose); }

  @media (max-width:600px) {
    header { padding:0 1rem; height:48px; }
    .logo-text { font-size:0.95rem; }
    .status-pill { display:none; }
    .container { padding:1rem; }
    .form-card { padding:1rem; }
    .form-row { grid-template-columns:1fr; gap:0.4rem; }
    .section-title { font-size:1.05rem; }
    .job-row { padding:0.55rem 0.65rem; gap:0.5rem; }
    .job-printer-label { min-width:70px; font-size:0.62rem; }
    .job-team-line { font-size:0.72rem; }
    .rejected-row { flex-wrap:wrap; gap:0.4rem; }
    .rejected-reason { max-width:none; white-space:normal; }
    .toast { font-size:0.68rem; padding:0.55rem 0.85rem; max-width:90vw; white-space:normal; text-align:center; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="20" width="28" height="3" rx="1" fill="#f97316"/>
        <rect x="8" y="14" width="20" height="7" rx="1" fill="#18181b" stroke="#f97316" stroke-width="1.2"/>
        <rect x="14" y="23" width="8" height="8" rx="1" fill="#111114" stroke="#27272a" stroke-width="1"/>
        <circle cx="18" cy="17" r="2.5" fill="#f97316" opacity="0.7"/>
        <rect x="16.5" y="5" width="3" height="10" rx="1" fill="#f97316" opacity="0.4"/>
      </svg>
    </div>
    <div class="logo-text">MECH <span>PrintLab</span></div>
  </div>
  <div class="header-right">
    <div class="status-pill">SYSTEM ONLINE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="container">

  <!-- Submit Form -->
  <div class="submit-section">
    <div class="section-label">Submit a Print</div>
    <div class="section-title">Upload Your 3D Print Job</div>
    <div class="form-card">
      <div class="form-row" style="margin-bottom:0.85rem">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Course</label>
          <select class="form-select" id="courseStream">
            <option value="">— Select —</option>
            <option value="Morphing Wing">Morphing Wing</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Timetable Stream</label>
          <input class="form-input" id="timetableStream" type="text" placeholder="e.g. 1A" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Team / Group</label>
        <input class="form-input" id="team" type="text" placeholder="e.g. F" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Project Name</label>
        <input class="form-input" id="projectName" type="text" placeholder="e.g. bracket_v2" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Print File</label>
        <div class="file-upload">
          <div class="file-upload-label" id="fileLabel">
            <span>&#128193;</span>
            <span id="fileName">Choose a file to upload...</span>
          </div>
          <input type="file" id="fileInput" accept=".3mf,.stl,.obj,.step,.stp,.gcode" onchange="updateFileName()">
        </div>
        <div class="file-hint">.3mf recommended — also accepts .stl, .obj, .step, .gcode</div>
      </div>
      <div class="form-row" style="margin-bottom:0.85rem">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Material</label>
          <select class="form-select" id="material">
            <option value="PLA">PLA</option>
            <option value="PETG">PETG</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Estimated Duration</label>
          <div class="duration-grid">
            <div class="duration-btn" data-hours="0.5" onclick="selectDuration(this)">30m</div>
            <div class="duration-btn active" data-hours="1" onclick="selectDuration(this)">1h</div>
            <div class="duration-btn" data-hours="1.5" onclick="selectDuration(this)">1.5h</div>
            <div class="duration-btn" data-hours="2" onclick="selectDuration(this)">2h</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-textarea" id="notes" placeholder="Any special requirements..."></textarea>
      </div>
      <div class="checklist" id="checklist">
        <div class="checklist-title">Before submitting, confirm:</div>
        <div class="check-item">
          <input type="checkbox" id="chkDuration">
          <label for="chkDuration">My print will complete in under 90 minutes</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chkFileName">
          <label for="chkFileName">My file name contains my stream and team name</label>
        </div>
        <div class="check-item">
          <input type="checkbox" id="chkPickup">
          <label for="chkPickup">I will pick up my print as soon as it is finished</label>
        </div>
      </div>
      <button class="submit-btn" id="bookBtn" onclick="submitBooking()">Submit Print Job</button>
    </div>
  </div>

  <!-- Active Jobs -->
  <div class="jobs-section">
    <div class="section-label">Live Status</div>
    <div class="section-title" id="queueTitle">Active Jobs <span style="font-weight:400;font-size:0.75rem;color:var(--text-tertiary)">loading...</span></div>
    <div class="jobs-grid" id="jobsList"><div class="empty-msg">Loading...</div></div>
  </div>

  <!-- Rejection Board -->
  <div class="rejected-section">
    <div class="section-label">Rejection Board</div>
    <div class="section-title" style="margin-bottom:0.85rem">Recently Rejected</div>
    <div class="rejected-list" id="rejectedList"><div class="empty-msg">Loading...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let bookings = [];
let rejected = [];
let selectedDuration = 1;

async function init() {
  await Promise.all([loadBookings(), loadRejected()]);
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(refresh, 30000);
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-AU', {hour12:false});
}

async function loadBookings() {
  try {
    const res = await fetch('/api/bookings');
    if (!res.ok) throw new Error('Server error');
    bookings = await res.json();
    renderJobs();
  } catch (err) { console.error('Failed to load bookings:', err); }
}

async function loadRejected() {
  try {
    const res = await fetch('/api/bookings/rejected');
    if (!res.ok) throw new Error('Server error');
    rejected = await res.json();
    renderRejected();
  } catch (err) { console.error('Failed to load rejected:', err); }
}

async function refresh() { await Promise.all([loadBookings(), loadRejected()]); }

function renderJobs() {
  const list = document.getElementById('jobsList');
  const title = document.getElementById('queueTitle');
  const printingCount = bookings.filter(b => b.status === 'printing').length;
  const queuedCount = bookings.filter(b => b.status === 'queued').length;
  title.innerHTML = 'Active Jobs <span style="font-weight:400;font-size:0.75rem;color:var(--text-tertiary)">' + queuedCount + ' queued, ' + printingCount + ' printing</span>';

  if (bookings.length === 0) {
    list.innerHTML = '<div class="empty-msg">No active jobs</div>';
    return;
  }

  list.innerHTML = bookings.map(b => {
    const dur = b.duration === 0.5 ? '30m' : b.duration + 'h';
    const isPrinting = b.status === 'printing';
    const statusClass = isPrinting ? 'printing' : 'queued';
    const badgeClass = isPrinting ? 'badge-printing' : 'badge-queued';
    const statusText = isPrinting ? 'PRINTING' : 'QUEUED';
    const printerStr = b.printer_label ? esc(b.printer_label) : 'Unassigned';

    return '<div class="job-row">' +
      '<div class="job-status-dot ' + statusClass + '"></div>' +
      '<div class="job-printer-label">' + printerStr + '</div>' +
      '<div class="job-details">' +
        '<div class="job-team-line">' + esc(b.timetable_stream) + ' — ' + esc(b.team) + '</div>' +
        '<div class="job-meta-line">' + esc(b.project) + ' &middot; ' + esc(b.material) + ' &middot; ' + dur + '</div>' +
      '</div>' +
      '<span class="job-status-badge ' + badgeClass + '">' + statusText + '</span>' +
    '</div>';
  }).join('');
}

function renderRejected() {
  const list = document.getElementById('rejectedList');
  if (rejected.length === 0) {
    list.innerHTML = '<div class="empty-msg">No rejected jobs</div>';
    return;
  }
  list.innerHTML = rejected.map(r => {
    return '<div class="rejected-row">' +
      '<div class="rejected-team">' + esc(r.timetable_stream) + ' — ' + esc(r.team) + '</div>' +
      '<div class="rejected-file">' + esc(r.file_original_name || 'No file') + '</div>' +
      '<div class="rejected-reason">' + esc(r.reject_reason || '—') + '</div>' +
      '<div class="rejected-date">' + esc(r.booking_date) + '</div>' +
    '</div>';
  }).join('');
}

function selectDuration(el) {
  document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedDuration = parseFloat(el.dataset.hours);
}

function updateFileName() {
  const input = document.getElementById('fileInput');
  const label = document.getElementById('fileLabel');
  const nameEl = document.getElementById('fileName');
  if (input.files.length > 0) {
    const f = input.files[0];
    nameEl.textContent = f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + ' MB)';
    label.classList.add('has-file');
  } else {
    nameEl.textContent = 'Choose a file to upload...';
    label.classList.remove('has-file');
  }
}

async function submitBooking() {
  const courseStream = document.getElementById('courseStream').value;
  const timetableStream = document.getElementById('timetableStream').value.trim();
  const team = document.getElementById('team').value.trim();
  const project = document.getElementById('projectName').value.trim();
  const material = document.getElementById('material').value;
  const notes = document.getElementById('notes').value.trim();
  const fileInput = document.getElementById('fileInput');

  if (!courseStream) { showToast('Select a course', true); return; }
  if (!timetableStream) { showToast('Enter a timetable stream', true); return; }
  if (!team) { showToast('Enter a team / group name', true); return; }
  if (!project) { showToast('Enter a project name', true); return; }
  if (!fileInput.files.length) { showToast('Upload a print file (.3mf recommended)', true); return; }

  const chk1 = document.getElementById('chkDuration').checked;
  const chk2 = document.getElementById('chkFileName').checked;
  const chk3 = document.getElementById('chkPickup').checked;
  const checklist = document.getElementById('checklist');
  if (!chk1 || !chk2 || !chk3) {
    checklist.classList.add('has-error');
    showToast('Please confirm all checklist items before submitting', true);
    return;
  }
  checklist.classList.remove('has-error');

  const btn = document.getElementById('bookBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  const fd = new FormData();
  fd.append('courseStream', courseStream);
  fd.append('timetableStream', timetableStream);
  fd.append('team', team);
  fd.append('project', project);
  fd.append('file', fileInput.files[0]);
  fd.append('material', material);
  fd.append('duration', selectedDuration);
  if (notes) fd.append('notes', notes);

  try {
    const res = await fetch('/api/bookings', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json();
      showToast(err.error || 'Submission failed', true);
      btn.disabled = false;
      btn.textContent = 'Submit Print Job';
      return;
    }

    document.getElementById('courseStream').value = '';
    document.getElementById('timetableStream').value = '';
    document.getElementById('team').value = '';
    document.getElementById('projectName').value = '';
    document.getElementById('notes').value = '';
    document.getElementById('chkDuration').checked = false;
    document.getElementById('chkFileName').checked = false;
    document.getElementById('chkPickup').checked = false;
    fileInput.value = '';
    updateFileName();

    await refresh();
    showToast('Print job submitted successfully');
  } catch (err) {
    console.error('Booking error:', err);
    showToast('Network error — try again', true);
  }
  btn.disabled = false;
  btn.textContent = 'Submit Print Job';
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

init();
</script>
</body>
</html>
