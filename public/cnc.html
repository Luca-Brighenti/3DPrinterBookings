<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECH PrintLab - CNC Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#09090b; --surface:#111114; --surface-raised:#18181b; --surface-overlay:#1f1f23; --border:rgba(255,255,255,.08); --accent:#a78bfa; --accent-bright:#c4b5fd; --emerald:#10b981; --rose:#f43f5e; --text:#fafafa; --text-muted:#71717a; --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --radius:12px; --radius-sm:8px; --radius-xs:6px; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
  .site-nav{background:rgba(9,9,11,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .nav-links{display:flex;gap:2px;padding:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
  .nav-link{font-family:var(--mono);font-size:.62rem;padding:5px 11px;border-radius:var(--radius-xs);text-decoration:none;color:var(--text-muted);text-transform:uppercase}
  .nav-link.active,.nav-link:hover{color:var(--accent);background:var(--surface-raised)}
  .container{max-width:1220px;margin:0 auto;padding:1.5rem}
  .live-banner{margin-bottom:1rem;padding:.75rem 1rem;border-radius:var(--radius-sm);font-family:var(--mono);font-size:.75rem;border:1px solid var(--border);background:var(--surface)}
  .live-banner.live{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.12);color:var(--emerald)}
  .live-banner.offline{border-color:rgba(244,63,94,.28);background:rgba(244,63,94,.1);color:var(--rose)}
  .grid{display:grid;grid-template-columns:390px 1fr;gap:1rem;align-items:start}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
  .title{font-weight:800;margin:0 0 .85rem}
  .label{display:block;font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:.25rem}
  .input,.btn{width:100%;border-radius:var(--radius-xs);border:1px solid var(--border)}
  .input{background:var(--surface-raised);color:var(--text);padding:.6rem .72rem;margin-bottom:.65rem}
  .input:focus{outline:none;border-color:var(--accent)}
  .file{margin-bottom:.65rem}
  .hint{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-top:-.35rem;margin-bottom:.55rem}
  .btn{cursor:pointer;padding:.7rem .85rem;background:var(--accent);color:#fff;font-weight:700}
  .btn:hover{background:var(--accent-bright)}
  .tabs{display:flex;gap:2px;padding:3px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.8rem;width:max-content}
  .tab{border:none;background:transparent;color:var(--text-muted);font-family:var(--mono);font-size:.62rem;padding:.45rem .75rem;border-radius:var(--radius-xs);cursor:pointer;text-transform:uppercase}
  .tab.active,.tab:hover{color:var(--accent);background:var(--surface)}
  .panel{display:none}.panel.active{display:block}
  .row{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.65rem .8rem;display:grid;grid-template-columns:1fr auto;gap:.6rem;align-items:center;margin-bottom:.45rem}
  .meta{font-family:var(--mono);font-size:.62rem;color:var(--text-muted)}
  .legacy-tag{display:inline-block;margin-left:.4rem;padding:2px 6px;border-radius:999px;font-family:var(--mono);font-size:.52rem;font-weight:700;letter-spacing:.04em;background:rgba(245,158,11,.16);color:#f59e0b}
  .status-btn{border:1px solid var(--border);background:transparent;color:var(--emerald);border-radius:var(--radius-xs);padding:.4rem .55rem;font-family:var(--mono);font-size:.62rem;cursor:pointer}
  .status-btn:hover{background:rgba(16,185,129,.12)}
  .timer{font-family:var(--mono);font-size:.62rem;color:var(--emerald)}
  .timer.overdue{color:var(--rose)}
  @media (max-width:960px){ .grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<nav class="site-nav">
  <strong>MECH PrintLab</strong>
  <div class="nav-links">
    <a href="/" class="nav-link">3D Printing</a>
    <a href="/laser" class="nav-link">Laser Cutter</a>
    <a href="/windtunnel" class="nav-link">Wind Tunnel</a>
    <a href="/cnc" class="nav-link active">CNC</a>
  </div>
</nav>

<div class="container">
  <div id="liveBanner" class="live-banner">Checking CNC operator status...</div>
  <div class="grid">
    <div class="card">
      <h3 class="title">Submit CNC Job</h3>
      <label class="label">Course</label>
      <select id="courseStream" class="input">
        <option value="">- Select -</option>
        <option value="Morphing Wing">Morphing Wing</option>
      </select>
      <label class="label">Timetable Stream</label>
      <input id="timetableStream" class="input" placeholder="e.g. 1A">
      <label class="label">Team / Group</label>
      <input id="team" class="input" placeholder="e.g. F">
      <label class="label">Project Name</label>
      <input id="project" class="input" placeholder="e.g. wing_rev5">

      <label class="label">Top Surface (.step)</label>
      <input id="topSurfaceFile" class="input file" type="file" accept=".step">
      <div class="hint">STEP only (.step)</div>
      <label class="label">Bottom Surface (.step)</label>
      <input id="bottomSurfaceFile" class="input file" type="file" accept=".step">
      <div class="hint">STEP only (.step)</div>
      <label class="label">Leading Edge / Other (.step)</label>
      <input id="leadingEdgeFile" class="input file" type="file" accept=".step">
      <div class="hint">STEP only (.step)</div>

      <button class="btn" id="submitBtn" onclick="submitCnc()">Submit CNC Job</button>
    </div>

    <div>
      <div class="tabs">
        <button class="tab active" id="tabQueue" onclick="switchTab('queue')">Queue</button>
        <button class="tab" id="tabReady" onclick="switchTab('ready')">Collection Window</button>
        <button class="tab" id="tabRejected" onclick="switchTab('rejected')">Rejection Window</button>
      </div>

      <div class="panel active card" id="panelQueue"></div>
      <div class="panel card" id="panelReady"></div>
      <div class="panel card" id="panelRejected"></div>
    </div>
  </div>
</div>

<script>
let readyRows = [];
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function timeLeft(ms){ if(ms<=0) return 'Overdue'; const s=Math.floor(ms/1000); const d=Math.floor(s/86400); const h=Math.floor((s%86400)/3600); const m=Math.floor((s%3600)/60); return d+'d '+h+'h '+m+'m';}

function switchTab(tab){
  const tabs=['queue','ready','rejected'];
  for(const t of tabs){
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
  }
}

async function loadLive(){
  const banner=document.getElementById('liveBanner');
  try{
    const res=await fetch('/api/cnc/live');
    const d=await res.json();
    const isLive=!!d.isLive;
    banner.className='live-banner '+(isLive?'live':'offline');
    banner.textContent=isLive?'CNC OPERATOR IS LIVE NOW - jobs are actively being worked.':'CNC operator currently offline - you can still submit jobs.';
  }catch{
    banner.className='live-banner offline';
    banner.textContent='Could not load CNC live status.';
  }
}

async function loadQueue(){
  const el=document.getElementById('panelQueue');
  try{
    const res=await fetch('/api/cnc');
    const rows=await res.json();
    if(!rows.length){ el.innerHTML='<div class="meta">No queued CNC jobs.</div>'; return; }
    el.innerHTML='<h3 class="title">Queued CNC Jobs</h3><div class="meta" style="margin-bottom:.6rem">Old booking tag means migrated from the previous time-based system (files may be missing).</div>'+rows.map(r=>'<div class="row"><div><strong>'+esc(r.timetable_stream)+' - '+esc(r.team)+(r.is_legacy?'<span class="legacy-tag">OLD BOOKING</span>':'')+'</strong><div class="meta">'+esc(r.project)+' | Top: '+esc(r.top_file_original_name||'—')+' | Bottom: '+esc(r.bottom_file_original_name||'—')+' | Leading: '+esc(r.leading_file_original_name||'—')+(r.is_legacy&&r.legacy_note?' | '+esc(r.legacy_note):'')+'</div></div><div class="meta">'+esc(r.created_str)+'</div></div>').join('');
  }catch{ el.innerHTML='<div class="meta">Failed to load queue.</div>'; }
}

async function loadReady(){
  const el=document.getElementById('panelReady');
  try{
    const res=await fetch('/api/cnc/ready');
    readyRows=await res.json();
    if(!readyRows.length){ el.innerHTML='<div class="meta">No jobs waiting for collection.</div>'; return; }
    el.innerHTML='<h3 class="title">Collection Window</h3><div class="meta" style="margin-bottom:.6rem">Old booking tag means migrated from the previous time-based system.</div>'+readyRows.map(r=>{
      const remaining=Number(r.due_at_ms)-Date.now();
      return '<div class="row"><div><strong>'+esc(r.timetable_stream)+' - '+esc(r.team)+(r.is_legacy?'<span class="legacy-tag">OLD BOOKING</span>':'')+'</strong><div class="meta">'+esc(r.project)+' | Ready: '+esc(r.completed_date)+(r.is_legacy&&r.legacy_note?' | '+esc(r.legacy_note):'')+'</div></div><div><div class="timer'+(remaining<=0?' overdue':'')+'" data-due="'+Number(r.due_at_ms)+'">'+timeLeft(remaining)+'</div><button class="status-btn" onclick="collect('+r.id+',\''+esc(r.team).replace(/'/g,"&#39;")+'\',\''+esc(r.timetable_stream).replace(/'/g,"&#39;")+'\')">Mark Collected</button></div></div>';
    }).join('');
  }catch{ el.innerHTML='<div class="meta">Failed to load collection window.</div>'; }
}

async function loadRejected(){
  const el=document.getElementById('panelRejected');
  try{
    const res=await fetch('/api/cnc/rejected');
    const rows=await res.json();
    if(!rows.length){ el.innerHTML='<div class="meta">No rejected CNC jobs.</div>'; return; }
    el.innerHTML='<h3 class="title">Rejection Window</h3><div class="meta" style="margin-bottom:.6rem">Old booking tag means migrated from the previous time-based system.</div>'+rows.map(r=>'<div class="row"><div><strong>'+esc(r.timetable_stream)+' - '+esc(r.team)+(r.is_legacy?'<span class="legacy-tag">OLD BOOKING</span>':'')+'</strong><div class="meta">'+esc(r.project)+' | '+esc(r.reject_reason||'No reason')+(r.is_legacy&&r.legacy_note?' | '+esc(r.legacy_note):'')+'</div></div><div class="meta">'+esc(r.booking_date)+'</div></div>').join('');
  }catch{ el.innerHTML='<div class="meta">Failed to load rejected window.</div>'; }
}

async function submitCnc(){
  const btn=document.getElementById('submitBtn');
  const courseStream=document.getElementById('courseStream').value.trim();
  const timetableStream=document.getElementById('timetableStream').value.trim();
  const team=document.getElementById('team').value.trim();
  const project=document.getElementById('project').value.trim();
  const top=document.getElementById('topSurfaceFile').files[0];
  const bottom=document.getElementById('bottomSurfaceFile').files[0];
  const leading=document.getElementById('leadingEdgeFile').files[0];
  if(!courseStream||!timetableStream||!team||!project){ alert('Please complete all required text fields.'); return; }
  if(!top && !bottom && !leading){ alert('Upload at least one STEP file (.step).'); return; }
  const checkStep=(f)=>!f || String(f.name||'').toLowerCase().endsWith('.step');
  if(!checkStep(top)||!checkStep(bottom)||!checkStep(leading)){ alert('Only .step files are allowed.'); return; }
  const fd=new FormData();
  fd.append('courseStream',courseStream); fd.append('timetableStream',timetableStream); fd.append('team',team); fd.append('project',project);
  fd.append('topSurfaceFile',top); fd.append('bottomSurfaceFile',bottom); fd.append('leadingEdgeFile',leading);
  btn.disabled=true; btn.textContent='Submitting...';
  try{
    const res=await fetch('/api/cnc',{method:'POST',body:fd});
    if(!res.ok){ const e=await res.json(); alert(e.error||'Submission failed'); btn.disabled=false; btn.textContent='Submit CNC Job'; return; }
    document.getElementById('courseStream').value=''; document.getElementById('timetableStream').value=''; document.getElementById('team').value=''; document.getElementById('project').value='';
    document.getElementById('topSurfaceFile').value=''; document.getElementById('bottomSurfaceFile').value=''; document.getElementById('leadingEdgeFile').value='';
    await loadQueue(); alert('CNC job submitted.');
  }catch{ alert('Network error'); }
  btn.disabled=false; btn.textContent='Submit CNC Job';
}

async function collect(id,team,timetableStream){
  if(!confirm('Mark this CNC job as collected?')) return;
  try{
    const res=await fetch('/api/cnc/'+id+'/collect',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({team,timetableStream})});
    if(!res.ok){ const e=await res.json(); alert(e.error||'Failed to mark collected'); return; }
    await Promise.all([loadReady(), loadQueue()]);
  }catch{ alert('Network error'); }
}

setInterval(()=>{
  document.querySelectorAll('[data-due]').forEach(el=>{
    const remaining=Number(el.getAttribute('data-due'))-Date.now();
    el.textContent=timeLeft(remaining);
    el.classList.toggle('overdue', remaining<=0);
  });
},1000);

async function init(){ await Promise.all([loadLive(),loadQueue(),loadReady(),loadRejected()]); setInterval(loadLive,20000); setInterval(()=>{loadQueue();loadReady();loadRejected();},30000); }
init();
</script>
</body>
</html>
